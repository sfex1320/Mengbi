appId: cn.mengbi.app
productName: 梦笔
directories:
  output: app
  buildResources: resources
files:
  - out/**
  - package.json
  - "!**/{.eslintrc.cjs,.prettierrc,tsconfig*.json,electron.vite.config.ts}"
  - "!**/{*.map,*.tsbuildinfo}"
# HYPIR 便携脚手架（bat + Python 服务源码 + 配置）随安装包发；
# 用户点"在默认位置展开脚手架"时由主进程从 process.resourcesPath/hypir-portable/ 拷过去
extraResources:
  - from: resources/hypir-portable
    to: hypir-portable
    filter:
      - "**/*"
asarUnpack:
  - resources/**
  - "**/*.{node,dll}"
  # sharp 是 native 模块，prebuilt 二进制放在 @img/sharp-* 子包；asar 里加载不到 .node 必失败
  - "node_modules/sharp/**"
  - "node_modules/@img/**"
  # onnxruntime-node:含 onnxruntime.dll / DirectML.dll / dxcompiler.dll(Windows EP),
  # native .node 加载时需要侧载 DLL,asar 里 dlopen 会失败
  - "node_modules/onnxruntime-node/**"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: mengbi-${version}-setup.${ext}
portable:
  artifactName: mengbi-${version}-portable.${ext}
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.graphics-design
  artifactName: mengbi-${version}.${ext}
linux:
  target:
    - AppImage
  category: Graphics
  artifactName: mengbi-${version}.${ext}
publish:
  provider: github
  owner: mengbi
  repo: mengbi
